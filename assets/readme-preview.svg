<svg width="1536" height="768" viewBox="0 0 1536 768" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NPV Tunnel NPVT Converter technical preview</title>
  <desc id="desc">Dark terminal themed technical diagram for converting V2Ray links to NPV Tunnel NPVT1 containers and back.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="72%">
      <stop offset="0" stop-color="#0a2a16"/>
      <stop offset="0.55" stop-color="#020904"/>
      <stop offset="1" stop-color="#000301"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#39ff88"/>
      <stop offset="1" stop-color="#b8ffd2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#061d0e" stop-opacity=".96"/>
      <stop offset="1" stop-color="#020704" stop-opacity=".96"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#39ff88" stroke-opacity=".07"/>
    </pattern>
    <style>
      .mono{font-family:Consolas,Menlo,Monaco,'Courier New',monospace}
      .sans{font-family:Inter,Segoe UI,Arial,sans-serif}
      .muted{fill:#88b597}.green{fill:#39ff88}.white{fill:#e7fff0}
      .chip{fill:#06140b;stroke:#39ff88;stroke-opacity:.42}
      .box{fill:url(#panel);stroke:#39ff88;stroke-opacity:.56}
      .thin{stroke:#39ff88;stroke-opacity:.42}.bright{stroke:url(#line)}
    </style>
  </defs>

  <rect width="1536" height="768" fill="url(#bg)"/>
  <rect width="1536" height="768" fill="url(#grid)"/>
  <rect x="24" y="24" width="1488" height="720" rx="28" fill="none" stroke="#39ff88" stroke-opacity=".22"/>
  <path d="M54 92V54h38M1444 54h38v38M54 676v38h38M1482 676v38h-38" fill="none" stroke="#39ff88" stroke-width="3" opacity=".72"/>

  <text x="88" y="96" class="mono green" font-size="22" letter-spacing="4">THELOUISMAHDI / LOCAL CONVERTER</text>
  <text x="88" y="164" class="sans white" font-size="62" font-weight="900" letter-spacing="-2">NPV Tunnel NPVT Converter</text>
  <text x="91" y="214" class="mono muted" font-size="24">Real-schema NPVT1 · V2Ray profile mapper · offline single HTML</text>

  <g transform="translate(88 270)">
    <rect class="box" width="360" height="310" rx="24" filter="url(#glow)"/>
    <text x="28" y="48" class="mono green" font-size="22">INPUT LINKS</text>
    <text x="28" y="88" class="mono white" font-size="31" font-weight="800">vless://</text>
    <text x="28" y="128" class="mono white" font-size="31" font-weight="800">vmess://</text>
    <text x="28" y="168" class="mono white" font-size="31" font-weight="800">trojan://</text>
    <text x="28" y="208" class="mono white" font-size="31" font-weight="800">ss:// socks://</text>
    <rect x="28" y="238" width="304" height="42" rx="21" class="chip"/>
    <text x="48" y="266" class="mono green" font-size="18">Base64 subscription scanner</text>
  </g>

  <g transform="translate(588 252)">
    <rect class="box" width="360" height="346" rx="24"/>
    <text x="28" y="50" class="mono green" font-size="22">PROFILE ENGINE</text>
    <line x1="28" y1="72" x2="332" y2="72" class="thin"/>
    <text x="28" y="114" class="mono white" font-size="22">configVersion: 4</text>
    <text x="28" y="154" class="mono white" font-size="22">configType: 1/3/5/6/7</text>
    <text x="28" y="194" class="mono white" font-size="22">v2rayProfile + lockConfig</text>
    <text x="28" y="234" class="mono white" font-size="22">persistJson selector</text>
    <text x="28" y="274" class="mono white" font-size="22">REALITY / TLS / WS / gRPC</text>
    <rect x="28" y="296" width="304" height="34" rx="17" fill="#39ff88" fill-opacity=".12" stroke="#39ff88" stroke-opacity=".45"/>
    <text x="48" y="319" class="mono green" font-size="16">deterministic schema mapping</text>
  </g>

  <g transform="translate(1088 270)">
    <rect class="box" width="360" height="310" rx="24" filter="url(#glow)"/>
    <text x="28" y="48" class="mono green" font-size="22">OUTPUT CONTAINER</text>
    <text x="28" y="103" class="sans white" font-size="58" font-weight="900">NPVT1</text>
    <g class="mono" font-size="19">
      <rect x="28" y="132" width="304" height="38" rx="14" class="chip"/>
      <text x="48" y="157" class="white">chunk 1: version</text>
      <rect x="28" y="184" width="304" height="38" rx="14" class="chip"/>
      <text x="48" y="209" class="white">chunk 2: profiles[]</text>
      <rect x="28" y="236" width="304" height="38" rx="14" class="chip"/>
      <text x="48" y="261" class="white">chunk 3: lockConfig</text>
    </g>
  </g>

  <g fill="none" stroke-width="5" filter="url(#glow)">
    <path d="M468 424C520 424 530 424 568 424" class="bright"/>
    <path d="M948 424C1000 424 1010 424 1068 424" class="bright"/>
    <path d="M558 404l28 20-28 20" class="bright"/>
    <path d="M1058 404l28 20-28 20" class="bright"/>
  </g>

  <g transform="translate(88 644)">
    <rect width="1360" height="52" rx="26" fill="#020704" fill-opacity=".72" stroke="#39ff88" stroke-opacity=".28"/>
    <text x="28" y="34" class="mono green" font-size="18">&gt;_ offline runtime</text>
    <text x="286" y="34" class="mono muted" font-size="18">no server · no upload · no build step · browser-only processing</text>
    <text x="1098" y="34" class="mono green" font-size="18">Download Index.html</text>
  </g>
</svg>
